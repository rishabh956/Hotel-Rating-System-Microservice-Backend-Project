spring:
  cloud:
    gateway:
     server:
      webflux:
       routes:
         - id: USERSERVICE
           uri: lb://USERSERVICE
           predicates:
            - Path=/users/**
         - id: RATINGSERVICE
           uri: lb://RATINGSERVICE
           predicates:
            - Path=/rating/**
         - id: HOTEL-SERVICE
           uri: lb://HOTEL-SERVICE
           predicates:
            - Path=/hotels/**

server:
  port: 8085
eureka:
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true
